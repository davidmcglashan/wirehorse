<!DOCTYPE html>
<html>
	<head>
		<title>Wirehorse - wireframing from the horse stable</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Redacted+Script:wght@300;400;700&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="css/wirehorse.css">
		<script type="text/javascript" src="js/defaults.js"></script>
		<script type="text/javascript" src="js/model.js"></script>
		<script type="text/javascript" src="js/toolbar.js"></script>
		<script type="text/javascript" src="js/glass.js"></script>
		<script type="text/javascript" src="js/selection.js"></script>
		<script type="text/javascript" src="js/canvas.js"></script>
		<script type="text/javascript" src="js/undo.js"></script>
		<script type="text/javascript" src="js/palette.js"></script>
	</head>
	<body>
		<div id="-canvas"></div>
		<div id="-glass"><div id="-caret" class="hidden"></div></div>
		<div id="-palette">
			<div id="-no-selection" class="message">No Selection!</div>
			<div id="-con-x" class="hidden">
				<label for="-fld-x">X</label>
				<input id="-fld-x" type="number">
			</div>
			<div id="-con-y" class="hidden">
				<label for="-fld-y">Y</label>
				<input id="-fld-y" type="number">
			</div>
			<div id="-con-w" class="hidden">
				<label for="-fld-w">Width</label>
				<input id="-fld-w" type="number" min="4">
			</div>
			<div id="-con-h" class="hidden">
				<label for="-fld-h">Height</label>
				<input id="-fld-h" type="number" min="4">
			</div>
			<div id="-con-bg" class="hidden">
				<label for="-fld-bg">Background</label>
				<input id="-fld-bg" type="button" data-type="colour" value=" ">
			</div>
			<div id="-con-co" class="hidden">
				<label for="-fld-co">Text</label>
				<input id="-fld-co" type="button" data-type="colour" value=" ">
			</div>
			<div id="-con-bo" class="hidden">
				<label for="-fld-bo">Border</label>
				<input id="-fld-bo" type="button" data-type="colour" value=" ">
			</div>
			<div id="-toolbar-arrange" class="toolbar hidden">
				<a href="javascript:void(0)" onclick="canvas.relayerSelection(event,'b')"><img src="assets/send-to-back-svgrepo-com.svg"></a>
				<a href="javascript:void(0)" onclick="canvas.relayerSelection(event,'f')"><img src="assets/bring-to-front-svgrepo-com.svg"></a>
			</div>
		</div>
		<div id="-toolbar">
			<div>
				<strong>Wirehorse</strong>
				<a href="javascript:void(0)" onclick="toolbar.new()">New</a>
				<span id="-title"><</span>
			</div>
			<div>
				<input type="text" id="-search" placeholder="Press / to add something">
				<ul id="-dropdown" class="hidden">
				</ul>
			</div>
			<div>
				<a href="javascript:void(0)" onclick="toolbar.palette()"><strong>[_]]]</strong></a>
			</div>
		</div>
		<script>
			palette.init()
			glass.init()
			canvas.init()
			toolbar.init()
			model.parse()
			selection.init()
		</script>
	</body>
</html>
